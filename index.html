<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Hospitalario</title>
    <style>
        /* Paleta de colores Pasteles: Rosas y Celestes */
        :root {
            --bg-principal: #f4f9f9;
            --rosa-pastel: #ffe5ec;
            --rosa-fuerte: #ffb3c6;
            --celeste-pastel: #e8f1f5;
            --celeste-fuerte: #b3e5fc;
            --texto: #4a5568;
            --blanco: #ffffff;
            --rojo-pastel: #ffccd5;
            --verde-pastel: #cbf3f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: #5a6b7c;
        }

        /* Login */
        .login-card {
            background: var(--blanco);
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid var(--rosa-pastel);
        }

        .login-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--celeste-fuerte);
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--blanco);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-top: 5px solid var(--rosa-fuerte);
        }

        .card.doctor-section {
            border-top: 5px solid var(--celeste-fuerte);
        }

        /* Botones */
        button {
            background-color: var(--celeste-fuerte);
            color: var(--texto);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--rosa-fuerte);
        }

        button.btn-eliminar {
            background-color: var(--rojo-pastel);
            padding: 5px 10px;
            font-size: 0.9em;
        }

        button.btn-eliminar:hover {
            background-color: #ff4d6d;
            color: white;
        }

        button.btn-estado {
            padding: 5px 10px;
            font-size: 0.9em;
        }

        /* Listas y Elementos */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: var(--bg-principal);
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--celeste-fuerte);
        }

        .logout-container {
            text-align: right;
            margin-bottom: 20px;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .badge.rol { background: var(--rosa-pastel); }
        .badge.disponible { background: var(--verde-pastel); color: #0f4c3a; }
        .badge.ocupada { background: var(--rojo-pastel); color: #5c0f1b; }

        .acciones-cama {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="loginSection" class="login-card">
        <h2>Iniciar Sesión</h2>
        <p style="text-align: center; font-size: 0.9em; color: #888; line-height: 1.5;">
            Admin: <b>admin</b> / <b>123</b><br>
            Doctor: <b>doctor</b> / <b>123</b><br>
            Enfermera: <b>enfermera</b> / <b>123</b>
        </p>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()" style="width: 100%;">Entrar</button>
    </div>

    <div id="dashboardSection" class="dashboard">
        <div class="logout-container">
            <span id="userSession" style="margin-right: 15px; font-weight: bold;"></span>
            <button onclick="logout()" style="background-color: var(--rosa-pastel);">Cerrar Sesión</button>
        </div>

        <h1 id="welcomeTitle">Panel del Hospital</h1>

        <div class="grid">
            
            <div class="card">
                <h2>Gestión de Camas Disponibles</h2>
                <div id="panelAgregarCama" style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="camaNombre" placeholder="Ej. Cama 104" style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                    <button onclick="agregarCama()">Agregar Cama</button>
                </div>
                <ul id="listaCamas">
                    </ul>
            </div>

            <div class="card doctor-section">
                <h2>Personal Médico</h2>
                <div id="adminDoctorControl" style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="docNombre" placeholder="Nombre del Doctor" style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                    <input type="text" id="docEspecialidad" placeholder="Especialidad" style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                    <button onclick="agregarDoctor()">Agregar</button>
                </div>
                <ul id="listaDoctores">
                    </ul>
            </div>

        </div>
    </div>

</div>

<script>
    // Variables globales de sesión y datos simulados
    let usuarioActual = "";
    let rolActual = "";

    const datos = {
        camas: [
            { nombre: "Cama 101 - General", ocupada: false },
            { nombre: "Cama 102 - Trauma", ocupada: true },
            { nombre: "Cama 201 - Pediatría", ocupada: false }
        ],
        doctores: [
            { nombre: "Dr. Carlos Mendoza", esp: "Cardiología" },
            { nombre: "Dra. Elena Rostova", esp: "Pediatría" }
        ]
    };

    // Sistema de Credenciales Fáciles
    function login() {
        const user = document.getElementById('username').value.toLowerCase().trim();
        const pass = document.getElementById('password').value;

        if (user === "admin" && pass === "123") {
            loguearUsuario(user, "admin");
        } else if (user === "doctor" && pass === "123") {
            loguearUsuario(user, "doctor");
        } else if (user === "enfermera" && pass === "123") {
            loguearUsuario(user, "enfermera");
        } else {
            alert("Credenciales incorrectas. Intenta con admin/123, doctor/123 o enfermera/123");
        }
    }

    function loguearUsuario(username, rol) {
        usuarioActual = username;
        rolActual = rol;
        
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        document.getElementById('userSession').innerText = `Usuario: ${username.toUpperCase()} (${rol.toUpperCase()})`;
        
        // Configuración de interfaz según rol dinámico
        if (rol === "admin") {
            document.getElementById('welcomeTitle').innerText = "Panel del Administrador";
            document.getElementById('panelAgregarCama').style.display = 'flex';
            document.getElementById('adminDoctorControl').style.display = 'flex';
        } 
        else if (rol === "doctor") {
            document.getElementById('welcomeTitle').innerText = "Panel del Doctor";
            document.getElementById('panelAgregarCama').style.display = 'flex';
            document.getElementById('adminDoctorControl').style.display = 'none'; // No maneja doctores
        } 
        else if (rol === "enfermera") {
            document.getElementById('welcomeTitle').innerText = "Panel de Enfermería";
            document.getElementById('panelAgregarCama').style.display = 'none';  // No agrega camas nuevas
            document.getElementById('adminDoctorControl').style.display = 'none'; // No maneja doctores
        }

        renderizarTodo();
    }

    function logout() {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('username').value = "";
        document.getElementById('password').value = "";
    }

    // Renderizar Listas en Pantalla considerando los permisos de roles
    function renderizarTodo() {
        // --- RENDER CAMAS ---
        const listaCamas = document.getElementById('listaCamas');
        listaCamas.innerHTML = "";
        
        datos.camas.forEach((cama, index) => {
            const estadoTexto = cama.ocupada ? "Ocupada" : "Disponible";
            const estadoClase = cama.ocupada ? "ocupada" : "disponible";
            const botonEstadoTexto = cama.ocupada ? "Marcar Desocupada" : "Marcar Ocupada";

            // Permisos para Camas: Admin y Enfermera pueden Eliminar y cambiar Estado.
            const puedeModificarCamas = (rolActual === 'admin' || rolActual === 'enfermera');
            
            const accionesHTML = puedeModificarCamas ? `
                <div class="acciones-cama">
                    <button class="btn-estado" onclick="alternarEstadoCama(${index})" style="background-color: var(--celeste-pastel)">${botonEstadoTexto}</button>
                    <button class="btn-eliminar" onclick="eliminarCama(${index})">Eliminar</button>
                </div>
            ` : '';

            listaCamas.innerHTML += `
                <li>
                    <div>
                        <span>🛏️ <b>${cama.nombre}</b></span>
                        <span class="badge ${estadoClase}">${estadoTexto}</span>
                    </div>
                    ${accionesHTML}
                </li>
            `;
        });

        // --- RENDER DOCTORES ---
        const listaDoctores = document.getElementById('listaDoctores');
        listaDoctores.innerHTML = "";
        
        datos.doctores.forEach((doc, index) => {
            // Solo se muestra el botón eliminar doctores si es Administrador
            const botonEliminarDoc = (rolActual === 'admin') 
                ? `<button class="btn-eliminar" onclick="eliminarDoctor(${index})">Eliminar</button>` 
                : '';

            listaDoctores.innerHTML += `
                <li>
                    <div>
                        <strong>${doc.nombre}</strong> <span class="badge rol">${doc.esp}</span>
                    </div>
                    ${botonEliminarDoc}
                </li>
            `;
        });
    }

    // --- FUNCIONES DE CAMAS ---
    function agregarCama() {
        // Solo Admin y Doctor pueden crear camas
        if (rolActual === 'admin' || rolActual === 'doctor') {
            const nombre = document.getElementById('camaNombre').value;
            if(nombre.trim() !== "") {
                datos.camas.push({ nombre: nombre, ocupada: false });
                document.getElementById('camaNombre').value = "";
                renderizarTodo();
            }
        }
    }

    function eliminarCama(index) {
        // Admin y Enfermera pueden eliminar camas
        if (rolActual === 'admin' || rolActual === 'enfermera') {
            datos.camas.splice(index, 1);
            renderizarTodo();
        } else {
            alert("No tienes permisos para eliminar camas.");
        }
    }

    function alternarEstadoCama(index) {
        // Admin y Enfermera pueden cambiar el estado libre/ocupado
        if (rolActual === 'admin' || rolActual === 'enfermera') {
            datos.camas[index].ocupada = !datos.camas[index].ocupada;
            renderizarTodo();
        } else {
            alert("No tienes permisos para cambiar el estado de las camas.");
        }
    }

    // --- FUNCIONES DE DOCTORES ---
    function agregarDoctor() {
        if(rolActual === 'admin') {
            const nombre = document.getElementById('docNombre').value;
            const esp = document.getElementById('docEspecialidad').value;
            
            if(nombre.trim() !== "" && esp.trim() !== "") {
                datos.doctores.push({ nombre: "Dr. " + nombre, esp: esp });
                document.getElementById('docNombre').value = "";
                document.getElementById('docEspecialidad').value = "";
                renderizarTodo();
            }
        }
    }

    function eliminarDoctor(index) {
        if(rolActual === 'admin') {
            datos.doctores.splice(index, 1);
            renderizarTodo();
        } else {
            alert("Acción denegada: Solo el Administrador puede eliminar doctores.");
        }
    }
</script>

</body>
</html>
